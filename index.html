<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blip Chat History Extractor v2</title>
    <style>
        :root {
            --primary: #2cc3d5;
            --primary-dark: #1fa2b2;
            --background: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333333;
            --text-light: #666666;
            --border: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            color: var(--primary-dark);
            margin-top: 0;
            font-size: 24px;
            border-bottom: 2px solid var(--background);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-light);
        }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border 0.3s;
            background-color: #fff;
        }

        input[type="text"]:focus, textarea:focus, select:focus {
            border-color: var(--primary);
            outline: none;
        }

        textarea {
            height: 120px;
            resize: vertical;
            font-family: monospace;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-dark);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #log {
            margin-top: 20px;
            padding: 15px;
            background: #272822;
            color: #f8f8f2;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            max-height: 250px;
            overflow-y: auto;
            white-space: pre-wrap;
            display: none;
        }

        .hint {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Blip Conversas para CSV</h1>
    
    <div class="form-group">
        <label for="token">Router/Bot Access Key (Token)</label>
        <input type="text" id="token" placeholder="Key bGltZWFwaTpxV2...">
        <div class="hint">O token que você usa no Header "Authorization".</div>
    </div>

    <div class="form-group">
        <label>Modo de Origem dos Contatos</label>
        <div class="radio-group">
            <label class="radio-option">
                <input type="radio" name="modo" value="auto" checked onchange="toggleModo()">
                Automático (Buscar últimos 100 do CRM)
            </label>
            <label class="radio-option">
                <input type="radio" name="modo" value="manual" onchange="toggleModo()">
                Lista Manual (Colar Identities)
            </label>
        </div>
    </div>

    <div class="form-group hidden" id="grupoManual">
        <label for="identities">Identities dos Usuários (Um por linha)</label>
        <textarea id="identities" placeholder="5571992541615@wa.gw.msging.net&#10;5593999999999@wa.gw.msging.net"></textarea>
    </div>

    <button id="btnProcessar" onclick="processarConversas()">Gerar e Baixar CSV</button>

    <div id="log"></div>
</div>

<script>
    function toggleModo() {
        const modoManual = document.querySelector('input[name="modo"]:checked').value === 'manual';
        const grupoManual = document.getElementById('grupoManual');
        if (modoManual) {
            grupoManual.classList.remove('hidden');
        } else {
            grupoManual.classList.add('hidden');
        }
    }

    function logMessage(msg) {
        const logDiv = document.getElementById('log');
        logDiv.style.display = 'block';
        logDiv.innerText += msg + '\n';
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function buscarContatosDoCRM(token) {
        logMessage("Buscando os últimos 100 contatos do CRM Blip...");
        
        const payload = {
            id: crypto.randomUUID(),
            to: "postmaster@crm.msging.net",
            method: "get",
            uri: "/contacts?$take=100" // Força o Blip a trazer até 100 registros
        };

        const response = await fetch('https://http.msging.net/commands', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': token
            },
            body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error(`Erro ao buscar contatos: ${response.status}`);

        const data = await response.json();
        
        if (data.status === 'success' && data.resource && data.resource.items) {
            return data.resource.items.map(item => ({
                identity: item.identity,
                name: item.name || 'Sem Nome'
            }));
        } else {
            throw new Error(data.reason?.description || "Falha na resposta do CRM");
        }
    }

    async function processarConversas() {
        const tokenInput = document.getElementById('token').value.trim();
        const modo = document.querySelector('input[name="modo"]:checked').value;
        const btn = document.getElementById('btnProcessar');

        if (!tokenInput) {
            alert('Por favor, insira o Token do Bot.');
            return;
        }

        const token = tokenInput.startsWith('Key ') ? tokenInput : `Key ${tokenInput}`;
        let listaContatos = [];

        btn.disabled = true;
        btn.innerText = 'Processando...';
        document.getElementById('log').innerText = '';

        try {
            // 1. Definição/Busca da lista de contatos
            if (modo === 'auto') {
                listaContatos = await buscarContatosDoCRM(token);
                logMessage(`-> Sucesso! Encontrados ${listaContatos.length} contatos no CRM.`);
            } else {
                const identitiesText = document.getElementById('identities').value.trim();
                if (!identitiesText) {
                    alert('Por favor, insira ao menos um Identity na lista manual.');
                    btn.disabled = false;
                    btn.innerText = 'Gerar e Baixar CSV';
                    return;
                }
                listaContatos = identitiesText.split('\n')
                    .map(id => id.trim())
                    .filter(id => id.length > 0)
                    .map(id => ({ identity: id, name: 'N/A' }));
            }

            if (listaContatos.length === 0) {
                logMessage("Nenhum contato encontrado para processar.");
                btn.disabled = false;
                btn.innerText = 'Gerar e Baixar CSV';
                return;
            }

            // Cabeçalho do CSV (Incluído o Nome do Contato para melhorar a análise!)
            let csvRows = [['Telefone/Identity', 'Nome do Contato', 'Direção', 'Data', 'Mensagem']];

            // 2. Loop para buscar o histórico de cada contato
            for (const contato of listaContatos) {
                logMessage(`Buscando histórico para: ${contato.identity} (${contato.name})`);
                
                const payloadThread = {
                    id: crypto.randomUUID(),
                    method: "get",
                    uri: `/threads/${contato.identity}?refreshExpiredMedia=true`
                };

                try {
                    const responseThread = await fetch('https://http.msging.net/commands', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': token
                        },
                        body: JSON.stringify(payloadThread)
                    });

                    if (!responseThread.ok) {
                        logMessage(`-> Erro HTTP para ${contato.identity}: Status ${responseThread.status}`);
                        continue;
                    }

                    const dataThread = await responseThread.json();

                    if (dataThread.status === 'success' && dataThread.resource && dataThread.resource.items) {
                        const items = dataThread.resource.items;
                        const fone = contato.identity.split('@')[0];

                        items.forEach(item => {
                            let msgTexto = '';

                            if (typeof item.content === 'string') {
                                msgTexto = item.content;
                            } else if (typeof item.content === 'object' && item.content !== null) {
                                if (item.content.interactive && item.content.interactive.body) {
                                    msgTexto = item.content.interactive.body.text || '[Menu Interativo]';
                                } else {
                                    msgTexto = JSON.stringify(item.content);
                                }
                            }

                            csvRows.push([
                                fone, 
                                contato.name, 
                                item.direction || '', 
                                item.date || '', 
                                msgTexto
                            ]);
                        });
                    } else {
                        logMessage(`-> Sem histórico ou erro para ${contato.identity}`);
                    }

                } catch (err) {
                    logMessage(`-> Erro na requisição de ${contato.identity}: ${err.message}`);
                }

                // Delay para respeitar o rate limit da API do Blip
                await new Promise(resolve => setTimeout(resolve, 150));
            }

            // 3. Download do CSV final
            if (csvRows.length > 1) {
                logMessage('Gerando arquivo CSV...');
                downloadCSV(csvRows);
                logMessage('Download concluído!');
            } else {
                logMessage('Nenhuma mensagem foi extraída para gerar o CSV.');
            }

        } catch (error) {
            logMessage(`Erro geral no processo: ${error.message}`);
        }

        btn.disabled = false;
        btn.innerText = 'Gerar e Baixar CSV';
    }

    function downloadCSV(rows) {
        const csvContent = "\uFEFF" + rows.map(e => e.map(val => {
            let text = String(val).replace(/"/g, '""');
            return `"${text}"`;
        }).join(",")).join("\n");

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        
        link.setAttribute("href", url);
        link.setAttribute("download", `historico_blip_crm_${Date.now()}.csv`);
        link.style.visibility = 'hidden';
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
